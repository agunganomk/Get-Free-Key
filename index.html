<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-PROJECT | BYPASS SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f3ff; --dark: #020617; }
        body { background-color: var(--dark); color: #f8fafc; font-family: 'Rajdhani', sans-serif; background-image: linear-gradient(to right, rgba(0, 243, 255, 0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(0, 243, 255, 0.05) 1px, transparent 1px); background-size: 30px 30px; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 243, 255, 0.2); }
        .progress-bar { height: 4px; background: var(--cyan); transition: width 0.3s ease; box-shadow: 0 0 10px var(--cyan); }
        .copy-btn { background: rgba(0, 243, 255, 0.1); border: 1px solid var(--cyan); color: var(--cyan); font-size: 9px; padding: 2px 8px; border-radius: 4px; transition: all 0.2s; }
        .copy-btn:active { background: var(--cyan); color: black; transform: scale(0.9); }
    </style>
</head>
<body class="min-h-screen p-6 flex flex-col items-center">

    <div class="glass w-full max-w-md rounded-3xl p-8 border-t-2 border-cyan-500 shadow-[0_0_30px_rgba(0,243,255,0.2)]">
        <h1 class="font-cyber text-xl font-black text-center mb-1 tracking-tighter text-cyan-500">KEY GENERATOR</h1>
        <p id="step-label" class="text-[10px] text-center text-slate-500 tracking-[0.3em] uppercase mb-4">Step 1 of 5</p>

        <div class="w-full bg-slate-800 rounded-full h-1 mb-8">
            <div id="prog-val" class="progress-bar w-[20%]"></div>
        </div>

        <div id="ad-area" class="space-y-4 mb-8">
            <div class="ad-slot glass rounded-xl h-20 flex items-center justify-center border-dashed border-slate-700 text-[10px] text-slate-500 uppercase text-center p-4">
                KLIK SAMPE MUNCUL IKLAN LALU BACK DAN LANJUTKAN
            </div>
        </div>

        <div id="result-box" class="hidden space-y-4 mb-8">
            <div class="bg-cyan-500/10 p-4 rounded-xl border border-cyan-500/50">
                <p class="text-[9px] text-cyan-500 font-bold uppercase mb-3">Login Credentials (Active 24H)</p>
                
                <div class="flex items-center justify-between mb-3 bg-slate-900/50 p-2 rounded">
                    <p class="text-[10px] text-slate-400 uppercase">User: <span id="u-out" class="text-white font-cyber ml-2">--</span></p>
                    <button onclick="copyData('u-out')" class="copy-btn uppercase font-bold tracking-tighter">Copy</button>
                </div>

                <div class="flex items-center justify-between bg-slate-900/50 p-2 rounded">
                    <p class="text-[10px] text-slate-400 uppercase">Pass: <span id="p-out" class="text-white font-cyber ml-2">--</span></p>
                    <button onclick="copyData('p-out')" class="copy-btn uppercase font-bold tracking-tighter">Copy</button>
                </div>
            </div>
        </div>

        <button id="main-btn" onclick="handleStep()" class="w-full py-4 bg-cyan-600 text-black font-black font-cyber text-sm tracking-widest rounded-xl shadow-lg active:scale-95 transition-all uppercase">
            Start Verification
        </button>

        <p id="timer-text" class="hidden mt-4 text-[12px] text-center font-cyber text-pink-500 animate-pulse">Wait: 0s</p>
    </div>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBqIqdlzzXoZoT8N_J9HRmpoJvbH05Da4c",
            databaseURL: "https://inject-60ad5-default-rtdb.firebaseio.com",
            projectId: "inject-60ad5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentStep = 1;
        const timers = [0, 15, 10, 7, 5, 2];
        const adLinks = [
            "https://slot777mahjong.live/",
            "https://slot777mahjong.live/",
            "https://alur.cc/kode4d",
            "https://alur.cc/wak5000",
            "https://www.mediafire.com/file/41vvjmhr1jza8ax/DRAG_HEADSHOT_50%2525_YANZ.7z/file"
        ];

        function handleStep() {
            const btn = document.getElementById('main-btn');
            const timerText = document.getElementById('timer-text');
            const stepLabel = document.getElementById('step-label');
            const prog = document.getElementById('prog-val');

            if (currentStep <= 5) {
                window.open(adLinks[currentStep-1], '_blank');

                btn.disabled = true;
                btn.innerText = "VERIFYING...";
                btn.classList.replace('bg-cyan-600', 'bg-slate-700');
                
                timerText.classList.remove('hidden');
                let timeLeft = timers[currentStep];

                const countdown = setInterval(() => {
                    timerText.innerText = `PLEASE WAIT: ${timeLeft}s`;
                    timeLeft--;

                    if (timeLeft < 0) {
                        clearInterval(countdown);
                        timerText.classList.add('hidden');
                        btn.disabled = false;
                        btn.classList.replace('bg-slate-700', 'bg-cyan-600');
                        
                        if (currentStep < 5) {
                            currentStep++;
                            stepLabel.innerText = `Step ${currentStep} of 5`;
                            prog.style.width = (currentStep * 20) + "%";
                            btn.innerText = `Get Key (Step ${currentStep})`;
                        } else {
                            finalizeKey();
                        }
                    }
                }, 1000);
            }
        }

        function finalizeKey() {
            const btn = document.getElementById('main-btn');
            btn.innerText = "GENERATING ACCESS...";
            
            const user = "FREE-YANZ" + Math.random().toString(36).substring(2, 7).toUpperCase();
            const pass = Math.floor(1000 + Math.random() * 9000);
            
            const exp = new Date();
            exp.setHours(exp.getHours() + 20);
            const expString = exp.toISOString().split('T')[0];

            db.ref('users/' + user).set({
                password: pass.toString(),
                expired: expString,
                role: "member",
                status: "active",
                hwid: "" 
            }).then(() => {
                document.getElementById('u-out').innerText = user;
                document.getElementById('p-out').innerText = pass;
                document.getElementById('result-box').classList.remove('hidden');
                btn.innerText = "SUCCESSFULLY CREATED!";
                btn.classList.replace('bg-cyan-600', 'bg-green-600');
            }).catch(err => {
                alert("Firebase Error: " + err);
            });
        }

        // FUNGSI COPY DATA FIX (Support di Web View & Browser HP)
        function copyData(id) {
            const val = document.getElementById(id).innerText;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(val).then(() => {
                    alert("Copied: " + val);
                }).catch(() => {
                    fallbackCopy(val);
                });
            } else {
                fallbackCopy(val);
            }
        }

        // Cadangan jika browser lama atau webview tidak mendukung navigator.clipboard
        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed"; 
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                alert("Copied: " + text);
            } catch (err) {
                alert("Gagal copy otomatis, silahkan salin manual.");
            }
            document.body.removeChild(textArea);
        }
    </script>
</body>
</html>
